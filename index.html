<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界杯大小球预测 - InfoEdge信息差增强版</title>
    <script src="predictor.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header .subtitle {
            color: #8892b0;
            font-size: 0.9rem;
        }

        .data-status {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .data-status .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #8892b0;
            margin-bottom: 6px;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-group select:focus,
        .form-group input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .form-group select option {
            background: #1a1a2e;
            color: #fff;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .switch-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
        }

        .switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .btn-predict {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
        }

        .btn-predict:active {
            transform: translateY(0);
        }

        .btn-predict:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 结果区域 */
        .result-main {
            text-align: center;
            padding: 30px 0;
        }

        .prediction-label {
            font-size: 0.9rem;
            color: #8892b0;
            margin-bottom: 8px;
        }

        .prediction-result {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .prediction-strength {
            font-size: 1.1rem;
            color: #fbbf24;
            margin-bottom: 20px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-item {
            text-align: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #8892b0;
        }

        /* 比分预测 */
        .scorelines {
            margin-bottom: 20px;
        }

        .scorelines-title {
            font-size: 0.9rem;
            color: #8892b0;
            margin-bottom: 12px;
        }

        .scoreline-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .scoreline-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .scoreline-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .scoreline-score {
            font-weight: 600;
            font-size: 1rem;
        }

        .scoreline-prob {
            font-size: 0.85rem;
            color: #00d4ff;
        }

        .scoreline-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin: 0 12px;
            overflow: hidden;
        }

        .scoreline-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-radius: 2px;
            transition: width 0.5s;
        }

        /* 可折叠面板 */
        .collapsible {
            margin-bottom: 12px;
        }

        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .collapsible-header:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .collapsible-title {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .collapsible-icon {
            transition: transform 0.3s;
            color: #8892b0;
        }

        .collapsible.open .collapsible-icon {
            transform: rotate(180deg);
        }

        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .collapsible.open .collapsible-content {
            max-height: 1000px;
        }

        .collapsible-inner {
            padding: 16px;
        }

        /* 因子列表 */
        .factor-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .factor-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .factor-name {
            color: #ccd6f6;
        }

        .factor-impact {
            font-weight: 500;
        }

        .factor-impact.positive {
            color: #4ade80;
        }

        .factor-impact.negative {
            color: #f87171;
        }

        /* 信息差 */
        .info-edge-summary {
            padding: 12px;
            background: rgba(123, 44, 191, 0.15);
            border: 1px solid rgba(123, 44, 191, 0.3);
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .info-edge-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .info-edge-stat {
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .info-edge-stat-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #7b2cbf;
            margin-bottom: 2px;
        }

        .info-edge-stat-label {
            font-size: 0.7rem;
            color: #8892b0;
        }

        /* 关键洞察 */
        .insights-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .insight-item {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid #00d4ff;
            border-radius: 0 6px 6px 0;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 40px 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #8892b0;
            font-size: 0.9rem;
        }

        /* 权重调整 */
        .weight-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .weight-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .weight-change {
            color: #4ade80;
            font-weight: 500;
        }

        /* 移动端优化 */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .card {
                padding: 16px;
            }

            .prediction-result {
                font-size: 2.5rem;
            }

            .result-stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .stat-item {
                padding: 10px 8px;
            }

            .stat-value {
                font-size: 1.2rem;
            }

            .row {
                grid-template-columns: 1fr;
            }

            .info-edge-stats {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 480px) {
            .result-stats {
                grid-template-columns: repeat(3, 1fr);
            }

            .stat-label {
                font-size: 0.65rem;
            }

            .info-edge-stats {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 淡入动画 */
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .version-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(123, 44, 191, 0.3);
            border: 1px solid rgba(123, 44, 191, 0.5);
            border-radius: 20px;
            font-size: 0.75rem;
            color: #c084fc;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚽ 世界杯大小球预测 <span class="version-badge">V4.0 InfoEdge</span></h1>
            <div class="subtitle">8因子模型 + 信息差增强 + 动态权重 + 实时数据</div>
        </div>

        <div class="data-status">
            <div class="status-item">
                <div class="status-dot"></div>
                <span>数据源：<strong id="dataSource">模拟数据</strong></span>
            </div>
            <div class="status-item">
                <span>数据质量：<strong id="dataQuality">--</strong></span>
            </div>
            <div class="status-item">
                <span>更新时间：<strong id="updateTime">--</strong></span>
            </div>
        </div>

        <div class="main-content">
            <!-- 左侧控制面板 -->
            <div class="card">
                <div class="card-title">🎮 比赛设置</div>

                <div class="form-group">
                    <label>主队</label>
                    <select id="homeTeam">
                    </select>
                </div>

                <div class="form-group">
                    <label>客队</label>
                    <select id="awayTeam">
                    </select>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>比赛阶段</label>
                        <select id="stage">
                            <option value="小组赛">小组赛</option>
                            <option value="淘汰赛">淘汰赛</option>
                            <option value="决赛">决赛</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>大小球盘口</label>
                        <select id="handicap">
                            <option value="2.0">2.0 球</option>
                            <option value="2.5" selected>2.5 球</option>
                            <option value="3.0">3.0 球</option>
                            <option value="3.5">3.5 球</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>出线形势</label>
                    <select id="situation">
                        <option value="常规/未知">常规/未知</option>
                        <option value="双双出线">双双出线</option>
                        <option value="生死战">生死战</option>
                        <option value="荣誉之战">荣誉之战</option>
                        <option value="一队出线">一队出线</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>士气类型</label>
                    <select id="morale">
                        <option value="均衡">均衡</option>
                        <option value="强弱分明">强弱分明</option>
                        <option value="对攻大战">对攻大战</option>
                        <option value="保守战术">保守战术</option>
                    </select>
                </div>

                <div class="switch-group">
                    <span style="font-size: 0.9rem;">启用实时数据</span>
                    <label class="switch">
                        <input type="checkbox" id="useLiveData" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="switch-group">
                    <span style="font-size: 0.9rem;">自动刷新</span>
                    <label class="switch">
                        <input type="checkbox" id="autoRefresh">
                        <span class="slider"></span>
                    </label>
                </div>

                <button class="btn-predict" id="predictBtn">🔮 开始预测</button>
            </div>

            <!-- 右侧结果展示 -->
            <div class="card">
                <div class="card-title">📊 预测结果</div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <div class="loading-text">正在分析数据...</div>
                </div>

                <div id="resultContent" style="display: none;">
                    <div class="result-main fade-in">
                        <div class="prediction-label">预测结果</div>
                        <div class="prediction-result" id="prediction">--</div>
                        <div class="prediction-strength" id="strength">--</div>
                    </div>

                    <div class="result-stats fade-in">
                        <div class="stat-item">
                            <div class="stat-value" id="expectedGoals">--</div>
                            <div class="stat-label">预期进球</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="confidence">--</div>
                            <div class="stat-label">置信度</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="edge">--</div>
                            <div class="stat-label">差值</div>
                        </div>
                    </div>

                    <!-- 比分预测 -->
                    <div class="scorelines fade-in">
                        <div class="scorelines-title">🏆 比分预测 TOP5</div>
                        <div class="scoreline-list" id="scorelineList">
                        </div>
                    </div>

                    <!-- 信息差增强 -->
                    <div class="collapsible open" id="infoEdgeSection">
                        <div class="collapsible-header" onclick="toggleCollapsible('infoEdgeSection')">
                            <span class="collapsible-title">💡 信息差增强</span>
                            <span class="collapsible-icon">▼</span>
                        </div>
                        <div class="collapsible-content">
                            <div class="collapsible-inner">
                                <div class="info-edge-summary" id="infoEdgeSummary">--</div>
                                <div class="info-edge-stats">
                                    <div class="info-edge-stat">
                                        <div class="info-edge-stat-value" id="infoEdgeImpact">--</div>
                                        <div class="info-edge-stat-label">信息差影响</div>
                                    </div>
                                    <div class="info-edge-stat">
                                        <div class="info-edge-stat-value" id="playerImpact">--</div>
                                        <div class="info-edge-stat-label">球员状态</div>
                                    </div>
                                    <div class="info-edge-stat">
                                        <div class="info-edge-stat-value" id="signalConsistency">--</div>
                                        <div class="info-edge-stat-label">信号一致性</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 各因子影响 -->
                    <div class="collapsible" id="factorsSection">
                        <div class="collapsible-header" onclick="toggleCollapsible('factorsSection')">
                            <span class="collapsible-title">📈 各因子影响</span>
                            <span class="collapsible-icon">▼</span>
                        </div>
                        <div class="collapsible-content">
                            <div class="collapsible-inner">
                                <div class="factor-list" id="factorList">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 动态权重调整 -->
                    <div class="collapsible" id="weightsSection">
                        <div class="collapsible-header" onclick="toggleCollapsible('weightsSection')">
                            <span class="collapsible-title">⚖️ 动态权重调整</span>
                            <span class="collapsible-icon">▼</span>
                        </div>
                        <div class="collapsible-content">
                            <div class="collapsible-inner">
                                <div class="weight-list" id="weightList">
                                    <div style="color: #8892b0; font-size: 0.85rem; text-align: center;">
                                        启用实时数据后显示动态权重调整
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 实时数据详情 -->
                    <div class="collapsible" id="liveDataSection">
                        <div class="collapsible-header" onclick="toggleCollapsible('liveDataSection')">
                            <span class="collapsible-title">📡 实时数据详情</span>
                            <span class="collapsible-icon">▼</span>
                        </div>
                        <div class="collapsible-content">
                            <div class="collapsible-inner">
                                <div id="liveDataDetail">
                                    <div style="color: #8892b0; font-size: 0.85rem; text-align: center;">
                                        启用实时数据后显示详情
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 疲劳因子分析 -->
                    <div class="collapsible" id="fatigueSection">
                        <div class="collapsible-header" onclick="toggleCollapsible('fatigueSection')">
                            <span class="collapsible-title">🏃 疲劳因子分析</span>
                            <span class="collapsible-icon">▼</span>
                        </div>
                        <div class="collapsible-content">
                            <div class="collapsible-inner">
                                <div class="factor-list" id="fatigueDetail">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 关键洞察 -->
                    <div class="collapsible open" id="insightsSection">
                        <div class="collapsible-header" onclick="toggleCollapsible('insightsSection')">
                            <span class="collapsible-title">🎯 关键洞察</span>
                            <span class="collapsible-icon">▼</span>
                        </div>
                        <div class="collapsible-content">
                            <div class="collapsible-inner">
                                <div class="insights-list" id="insightsList">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化
        let predictor = null;
        let autoRefreshInterval = null;

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化球队下拉框
            initTeamSelects();
            
            // 绑定预测按钮
            document.getElementById('predictBtn').addEventListener('click', doPrediction);
            
            // 绑定自动刷新开关
            document.getElementById('autoRefresh').addEventListener('change', toggleAutoRefresh);
            
            // 回车触发预测
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    doPrediction();
                }
            });
            
            // 页面加载自动预测一次
            setTimeout(doPrediction, 500);
        });

        // 初始化球队选择
        function initTeamSelects() {
            const teams = getTeamList();
            const homeSelect = document.getElementById('homeTeam');
            const awaySelect = document.getElementById('awayTeam');
            
            teams.forEach(team => {
                const option1 = document.createElement('option');
                option1.value = team;
                option1.textContent = team;
                homeSelect.appendChild(option1);
                
                const option2 = document.createElement('option');
                option2.value = team;
                option2.textContent = team;
                awaySelect.appendChild(option2);
            });
            
            // 默认选择
            homeSelect.value = '葡萄牙';
            awaySelect.value = '摩洛哥';
        }

        // 执行预测
        function doPrediction() {
            const loading = document.getElementById('loading');
            const resultContent = document.getElementById('resultContent');
            const predictBtn = document.getElementById('predictBtn');
            
            loading.classList.add('active');
            resultContent.style.display = 'none';
            predictBtn.disabled = true;
            
            // 模拟加载延迟
            setTimeout(() => {
                try {
                    const homeTeam = document.getElementById('homeTeam').value;
                    const awayTeam = document.getElementById('awayTeam').value;
                    const stage = document.getElementById('stage').value;
                    const handicap = parseFloat(document.getElementById('handicap').value);
                    const situation = document.getElementById('situation').value;
                    const morale = document.getElementById('morale').value;
                    const useLiveData = document.getElementById('useLiveData').checked;
                    
                    // 创建预测器
                    predictor = new WorldCupPredictor();
                    predictor.setMatch(homeTeam, awayTeam, stage, handicap, situation, morale);
                    
                    // 设置实时数据
                    if (useLiveData) {
                        const liveData = generateMockLiveData(homeTeam, awayTeam);
                        predictor.setLiveData(liveData);
                        
                        // 更新数据状态
                        updateDataStatus(liveData);
                    } else {
                        updateDataStatus(null);
                    }
                    
                    // 执行预测
                    const result = predictor.predict();
                    
                    // 显示结果
                    displayResult(result);
                    
                    loading.classList.remove('active');
                    resultContent.style.display = 'block';
                    predictBtn.disabled = false;
                    
                } catch (error) {
                    console.error('预测出错:', error);
                    loading.classList.remove('active');
                    predictBtn.disabled = false;
                    alert('预测出错：' + error.message);
                }
            }, 300);
        }

        // 更新数据状态
        function updateDataStatus(liveData) {
            const dataSource = document.getElementById('dataSource');
            const dataQuality = document.getElementById('dataQuality');
            const updateTime = document.getElementById('updateTime');
            
            if (liveData) {
                dataSource.textContent = liveData.data_source === 'mock' ? '模拟数据' : '实时API';
                dataQuality.textContent = Math.round(liveData.data_quality * 100) + '%';
                updateTime.textContent = new Date().toLocaleTimeString('zh-CN');
            } else {
                dataSource.textContent = '基础模型';
                dataQuality.textContent = '--';
                updateTime.textContent = '--';
            }
        }

        // 显示结果
        function displayResult(data) {
            // 主结果
            document.getElementById('prediction').textContent = data.prediction;
            document.getElementById('strength').textContent = data.strength;
            document.getElementById('expectedGoals').textContent = data.expected_goals.toFixed(2);
            document.getElementById('confidence').textContent = Math.round(data.confidence * 100) + '%';
            document.getElementById('edge').textContent = data.edge.toFixed(2);
            
            // 比分预测
            const scorelineList = document.getElementById('scorelineList');
            scorelineList.innerHTML = '';
            const maxProb = data.top_scorelines[0]?.probability || 1;
            data.top_scorelines.forEach(sl => {
                const item = document.createElement('div');
                item.className = 'scoreline-item';
                item.innerHTML = `
                    <span class="scoreline-score">${sl.score}</span>
                    <div class="scoreline-bar">
                        <div class="scoreline-bar-fill" style="width: ${(sl.probability / maxProb * 100).toFixed(0)}%"></div>
                    </div>
                    <span class="scoreline-prob">${sl.probability.toFixed(1)}%</span>
                `;
                scorelineList.appendChild(item);
            });
            
            // 信息差
            document.getElementById('infoEdgeSummary').textContent = data.info_edge_summary;
            document.getElementById('infoEdgeImpact').textContent = (data.info_edge_impact * 100).toFixed(1) + '%';
            document.getElementById('playerImpact').textContent = Math.round(data.player_impact * 100) + '%';
            document.getElementById('signalConsistency').textContent = Math.round(data.signal_consistency * 100) + '%';
            
            // 各因子影响
            const factorList = document.getElementById('factorList');
            factorList.innerHTML = '';
            for (const [name, detail] of Object.entries(data.factors_detail)) {
                const item = document.createElement('div');
                item.className = 'factor-item';
                const impact = parseFloat(detail.impact);
                const impactClass = impact >= 0 ? 'positive' : 'negative';
                const impactSign = impact >= 0 ? '+' : '';
                item.innerHTML = `
                    <span class="factor-name">${name}</span>
                    <span class="factor-impact ${impactClass}">${impactSign}${detail.impact}</span>
                `;
                factorList.appendChild(item);
            }
            
            // 动态权重调整
            const weightList = document.getElementById('weightList');
            if (Object.keys(data.weight_adjustments).length > 0) {
                weightList.innerHTML = '';
                for (const [name, detail] of Object.entries(data.weight_adjustments)) {
                    const item = document.createElement('div');
                    item.className = 'weight-item';
                    item.innerHTML = `
                        <span>${name}</span>
                        <span class="weight-change">${detail.default} → ${detail.current} (${detail.change})</span>
                    `;
                    weightList.appendChild(item);
                }
            } else {
                weightList.innerHTML = '<div style="color: #8892b0; font-size: 0.85rem; text-align: center;">启用实时数据后显示动态权重调整</div>';
            }
            
            // 疲劳因子分析
            const fatigueDetail = document.getElementById('fatigueDetail');
            fatigueDetail.innerHTML = `
                <div class="factor-item">
                    <span class="factor-name">综合疲劳指数</span>
                    <span class="factor-impact">${data.fatigue_index.toFixed(2)}</span>
                </div>
                <div class="factor-item">
                    <span class="factor-name">对进球影响</span>
                    <span class="factor-impact negative">-${data.fatigue_impact.toFixed(1)}%</span>
                </div>
                <div class="factor-item">
                    <span class="factor-name">下半场进球占比</span>
                    <span class="factor-impact">${data.second_half_ratio.toFixed(1)}%</span>
                </div>
            `;
            
            // 关键洞察
            const insightsList = document.getElementById('insightsList');
            insightsList.innerHTML = '';
            data.key_insights.forEach(insight => {
                const item = document.createElement('div');
                item.className = 'insight-item';
                item.textContent = insight;
                insightsList.appendChild(item);
            });
            
            // 实时数据详情
            const liveDataDetail = document.getElementById('liveDataDetail');
            if (data.live_data_summary) {
                const summary = data.live_data_summary;
                liveDataDetail.innerHTML = `
                    <div class="factor-list">
                        <div class="factor-item">
                            <span class="factor-name">赔率数据</span>
                            <span class="factor-impact ${summary.odds_available ? 'positive' : 'negative'}">${summary.odds_available ? '✓ 可用' : '✗ 不可用'}</span>
                        </div>
                        <div class="factor-item">
                            <span class="factor-name">伤病信息</span>
                            <span class="factor-impact ${summary.injuries_available ? 'positive' : 'negative'}">${summary.injuries_available ? '✓ 可用' : '✗ 不可用'}</span>
                        </div>
                        <div class="factor-item">
                            <span class="factor-name">发布会言论</span>
                            <span class="factor-impact ${summary.press_available ? 'positive' : 'negative'}">${summary.press_available ? '✓ 可用' : '✗ 不可用'}</span>
                        </div>
                        <div class="factor-item">
                            <span class="factor-name">阵容信息</span>
                            <span class="factor-impact ${summary.lineup_available ? 'positive' : 'negative'}">${summary.lineup_available ? '✓ 可用' : '✗ 不可用'}</span>
                        </div>
                        <div class="factor-item">
                            <span class="factor-name">历史交锋</span>
                            <span class="factor-impact ${summary.h2h_available ? 'positive' : 'negative'}">${summary.h2h_available ? '✓ 可用' : '✗ 不可用'}</span>
                        </div>
                        <div class="factor-item">
                            <span class="factor-name">天气数据</span>
                            <span class="factor-impact ${summary.weather_available ? 'positive' : 'negative'}">${summary.weather_available ? '✓ 可用' : '✗ 不可用'}</span>
                        </div>
                        <div class="factor-item">
                            <span class="factor-name">裁判信息</span>
                            <span class="factor-impact ${summary.referee_available ? 'positive' : 'negative'}">${summary.referee_available ? '✓ 可用' : '✗ 不可用'}</span>
                        </div>
                    </div>
                `;
            } else {
                liveDataDetail.innerHTML = '<div style="color: #8892b0; font-size: 0.85rem; text-align: center;">启用实时数据后显示详情</div>';
            }
        }

        // 切换折叠面板
        function toggleCollapsible(id) {
            const element = document.getElementById(id);
            element.classList.toggle('open');
        }

        // 切换自动刷新
        function toggleAutoRefresh() {
            const autoRefresh = document.getElementById('autoRefresh').checked;
            
            if (autoRefresh) {
                // 每5分钟刷新一次
                autoRefreshInterval = setInterval(doPrediction, 5 * 60 * 1000);
            } else {
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                }
            }
        }
    </script>
</body>
</html>
